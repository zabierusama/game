<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Run Advanced</title>
<style>
  body{margin:0;background:#000;color:#fff;text-align:center;font-family:sans-serif}
  canvas{display:block;margin:0 auto;background:#05070f}
</style>
</head>
<body>
<h2>Temple Run Advanced</h2>
<p>← → 移動 / ↑ ジャンプ / ↓ スライディング</p>
<canvas id="game" width="300" height="500"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={lane:1,y:400,vy:0,sliding:false};
let gravity=0.6;
let speed=4;
let obstacles=[];
let coins=[];
let score=0;
let frame=0;

function spawn(){
  const lane=Math.floor(Math.random()*3);
  obstacles.push({lane,y:-20,type:Math.random()<0.5?"jump":"slide"});
}

function spawnCoin(){
  const lane=Math.floor(Math.random()*3);
  coins.push({lane,y:-20});
}

function update(){
  frame++;
  if(frame%60===0) spawn();
  if(frame%40===0) spawnCoin();

  speed+=0.002;

  player.vy+=gravity;
  player.y+=player.vy;
  if(player.y>400){player.y=400;player.vy=0;}

  obstacles.forEach(o=>o.y+=speed);
  coins.forEach(c=>c.y+=speed);

  // 衝突
  obstacles.forEach(o=>{
    if(o.lane===player.lane && Math.abs(o.y-player.y)<30){
      if(o.type==="jump" && player.y>=400) gameOver();
      if(o.type==="slide" && !player.sliding) gameOver();
    }
  });

  // コイン
  coins=coins.filter(c=>{
    if(c.lane===player.lane && Math.abs(c.y-player.y)<30){
      score+=50;
      return false;
    }
    return c.y<500;
  });

  obstacles=obstacles.filter(o=>o.y<500);
  score++;
}

function gameOver(){
  alert("ゲームオーバー！スコア:"+score);
  location.reload();
}

function draw(){
  ctx.clearRect(0,0,300,500);

  // 3D風レーン
  for(let i=0;i<20;i++){
    let w=300-(i*10);
    let x=(300-w)/2;
    ctx.fillStyle="#111";
    ctx.fillRect(x,i*25,w,2);
  }

  // プレイヤー
  ctx.fillStyle="#4fc3f7";
  let h=player.sliding?15:30;
  ctx.fillRect(player.lane*100+35,player.y+(30-h),30,h);

  // 障害物
  obstacles.forEach(o=>{
    ctx.fillStyle=o.type==="jump"?"#f44336":"#ff9800";
    ctx.fillRect(o.lane*100+35,o.y,30,30);
  });

  // コイン
  ctx.fillStyle="gold";
  coins.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.lane*100+50,c.y+15,10,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="#fff";
  ctx.fillText("Score: "+score,10,20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft"&&player.lane>0) player.lane--;
  if(e.key==="ArrowRight"&&player.lane<2) player.lane++;
  if(e.key==="ArrowUp"&&player.y>=400) player.vy=-12;
  if(e.key==="ArrowDown"){
    player.sliding=true;
    setTimeout(()=>player.sliding=false,500);
  }
});

loop();
</script>
</body>
</html>
